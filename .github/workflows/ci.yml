name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'

      - name: Generate icons (PNG/ICO)
        run: python3 scripts/generate_icons.py

      - name: Generate icons (macOS ICNS)
        if: runner.os == 'macOS'
        run: ./scripts/generate_icons_macos.sh

      - name: Configure
        run: cmake -S . -B build/ci -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build/ci --target ppe ppe_gui

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure
