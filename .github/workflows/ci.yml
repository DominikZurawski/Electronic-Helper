name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'

      - name: Generate icons (PNG/ICO)
        run: python3 scripts/generate_icons.py

      - name: Generate icons (macOS ICNS)
        if: runner.os == 'macOS'
        run: ./scripts/generate_icons_macos.sh

      - name: Configure
        run: cmake -S . -B build/ci -DCMAKE_BUILD_TYPE=Debug

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build/ci

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build/ci --config Debug

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build/ci --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build/ci -C Debug --output-on-failure

      - name: Verify script (Linux only)
        if: runner.os == 'Linux'
        run: ./scripts/verify.sh
