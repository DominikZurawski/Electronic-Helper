name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Generate icons (PNG/ICO)
        run: python3 scripts/generate_icons.py

      - name: Generate icons (macOS ICNS)
        if: runner.os == 'macOS'
        run: ./scripts/generate_icons_macos.sh

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/package_linux.sh

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/package_macos.sh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package_windows.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ runner.os }}
          path: |
            build/release/*.zip
            build/release/*.tgz
            build/release/*.dmg
            build/release/*.exe
            build/release/*.msi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/*.zip
            build/release/*.tgz
            build/release/*.dmg
            build/release/*.exe
            build/release/*.msi
